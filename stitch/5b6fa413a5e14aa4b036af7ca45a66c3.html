<body class="bg-background text-on-background font-body-lg text-body-lg min-h-screen flex flex-col" data-surface-id="SURF_STATUS_PAGE">

</div>
</div>

<h1 class="font-headline-lg text-headline-lg text-on-surface md:hidden">System Status</h1>
<h1 class="font-headline-lg text-headline-lg text-on-surface hidden md:block">System Status</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Check and refresh the current operational state.</p>
</div>
<div class="flex flex-col items-center gap-stack-md py-stack-md">
<!-- Status Indicator -->
<div class="flex flex-col items-center gap-stack-sm hidden" id="status-container">

<a class="font-label-sm text-label-sm text-on-surface-variant dark:text-on-primary-fixed-variant hover:text-primary dark:hover:text-primary-fixed transition-colors underline-offset-4 hover:underline" href="#">Support</a>

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const refreshBtn = document.getElementById('refreshBtn');
            const statusContainer = document.getElementById('status-container');
            const initialStateContainer = document.getElementById('initial-state-container');
            
            // Check localStorage on load
            if (localStorage.getItem('app_status') === 'refreshed') {
                showRefreshedState();
            }

            refreshBtn.addEventListener('click', () => {
                // Add a subtle spinning effect to icon during "refresh"
                const icon = refreshBtn.querySelector('.material-symbols-outlined');
                icon.classList.add('animate-spin');
                
                // Simulate network delay
                setTimeout(() => {
                    icon.classList.remove('animate-spin');
                    localStorage.setItem('app_status', 'refreshed');
                    showRefreshedState();
                }, 600);
            });

            function showRefreshedState() {
                initialStateContainer.classList.add('hidden');
                statusContainer.classList.remove('hidden');
            }
        });
    </script>
